<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modassembly Test App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { text-align: center; padding: 2rem; }
    h1 { font-size: 3rem; margin-bottom: 1rem; }
    .badge { 
      display: inline-block; padding: 0.5rem 1.5rem; border-radius: 999px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      font-size: 0.9rem; margin-top: 1rem;
    }
    p { color: rgba(255,255,255,0.7); font-size: 1.2rem; margin-top: 0.5rem; }
    .pulse { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="pulse">🤖</div>
    <h1>Hello from the Agent</h1>
    <p>This app was created, pushed to GitHub, and deployed to Vercel</p>
    <p>entirely by an AI agent — no local dev environment needed.</p>
    <div class="badge">Built with Modassembly</div>
  </div>
</body>
</html>
